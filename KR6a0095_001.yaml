body:
  text: 西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫臣施護奉詔譯爾時世尊放大光明普照耀已告苾芻衆言汝等當知於一時中有諸蟻聚夜中出煙晝日火然有一婆羅門見是事已乃作是言若有執持快利刀者必能破散其聚如是言已次復見一大龜其婆羅門亦作是言若有執持快利刀者必能破壞次見諸水母蟲次見一水蛭蟲次見諸阿西蘇那蟲次見一大蛇次見一挼陀鉢他蟲次見一哥嚩吒蟲其婆羅門見彼諸蟲已皆如前言最後見一大龍婆羅門言如我所見其事云何唯佛世尊悉能了知即時往詣一苾芻所具陳上事復言苾芻汝以此事為我問佛使我疑心而得開曉如佛所說我當憶持何以故苾芻我不見彼天人世間沙門婆羅門衆中有以此義能問佛者是故不能使諸疑心而得開曉時彼苾芻即如其言來詣我所到已禮足退住一面具陳上事已復發問言如婆羅門所見蟻聚其事云何夜中出煙晝日火然此復云何又見大龜水母蟲水蛭蟲阿西蘇那蟲大蛇挼陀鉢他蟲哥嚩吒蟲大龍此等所見皆是何相即彼婆羅門復是何人何故名為利刀破散願佛為說諸苾芻我時謂彼苾芻言其蟻聚者即是一切衆生五蘊聚身夜中出煙者即是衆生起諸尋伺晝日火然者即是衆生隨所尋伺起身語業大龜者即是五鄣染法水母蟲者即是忿恚水蛭蟲者即是慳嫉阿西蘇那蟲者即是五欲之法蛇者即是無明挼陀鉢他蟲者是疑惑哥嚩吒蟲者是我慢龍者即是諸阿羅漢婆羅門者即是如來應供正等正覺快利者即是有智之人刀者即是智慧破散者即是發起精進勝行諸苾芻於汝意云何彼所見相以要言之即是一切衆生五蘊聚身羯邏藍等父母不淨之所出生四大合成虛假色相麁惡劣弱積集苦惱畢竟破壞而諸衆生不能覺知於晝夜中起諸尋伺而身語業不善施作五鄣煩惱之所覆蔽耽著五欲增長無明生我慢心於諸聖法疑惑不決忿恚慳嫉念念發起不求解脫是故如來應供正等正覺欲令諸有智者發精進行修習智慧斷諸煩惱趣證聖果汝諸苾芻已盡諸漏證阿羅漢果故說如龍復次諸苾芻過去未來諸佛世尊悲愍利樂一切衆生欲令斷諸煩惱趣證聖果為諸聲聞廣說是義我於今日亦如諸佛乃以此緣為汝宣說汝諸苾芻憶念是事當於曠野空舍山間樹下巖穴菴室諸寂靜處諦心思惟觀察是義無令放逸生退轉心亦復轉為他人開示教導普令修習得大利樂爾時世尊為諸苾芻如是說已而諸苾芻皆悉信受
